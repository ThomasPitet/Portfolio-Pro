<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Contacts</title>
        <link rel="stylesheet" href="../style/style.css" />
    </head>
    <body>
        <div class="container">
            <div class="contact-container">
                <section class="profile-section">
                    <h1>Contactez-moi</h1>
                    <p>N'hésitez pas à me contacter pour toute opportunité ou question.</p>
                </section>
                <section class="contact-info">
                    <h2>Mes coordonnées directes</h2>
                    <p>
                        <a href="tel:0670122844"> 06 70 12 28 44</a>
                        <a href="mailto:thomaspitet.pro@gmail.com"> Email</a>
                    </p>
                </section>
                <section class="contact-form">
                    <h2>Formulaire de contact</h2>
                    <div id="form-success" style="display:none; background:#d4edda; color:#155724; border:1px solid #c3e6cb; border-radius:4px; padding:1rem 1.5rem; margin-bottom:1rem;">
                        Votre message a bien été envoyé !
                    </div>
                    <form id="contact-form" action="https://formsubmit.co/ajax/thomaspitet.pro@gmail.com" method="POST">
                        <input type="hidden" name="_subject" value="Nouveau message depuis le portfolio" />
                        <input type="hidden" name="_captcha" value="false" />
                        <div class="form-group">
                            <label for="name">Nom complet</label>
                            <input type="text" id="name" name="name" required placeholder="Votre nom">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="votre@email.com">
                        </div>
                        <div class="form-group">
                            <label for="subject">Sujet</label>
                            <input type="text" id="subject" name="subject" required placeholder="Sujet de votre message">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" required placeholder="Votre message..."></textarea>
                        </div>
                        <button type="submit" class="btn">Envoyer le message</button>
                    </form>
                    <script>
                        document.getElementById('contact-form').addEventListener('submit', function(e) {
                            e.preventDefault();
                            var form = this;
                            var btn = form.querySelector('button[type="submit"]');
                            btn.disabled = true;
                            btn.textContent = 'Envoi en cours...';
                            fetch(form.action, {
                                method: 'POST',
                                body: new FormData(form),
                                headers: { 'Accept': 'application/json' }
                            })
                            .then(function(res) { return res.json(); })
                            .then(function(data) {
                                if (data.success === 'true' || data.success === true) {
                                    form.reset();
                                    form.style.display = 'none';
                                    document.getElementById('form-success').style.display = 'block';
                                } else {
                                    btn.disabled = false;
                                    btn.textContent = 'Envoyer le message';
                                    alert('Une erreur est survenue, veuillez réessayer.');
                                }
                            })
                            .catch(function() {
                                btn.disabled = false;
                                btn.textContent = 'Envoyer le message';
                                alert('Une erreur est survenue, veuillez réessayer.');
                            });
                        });
                    </script>
                </section>
                <nav style="text-align: center; margin-top: 2rem;">
                    <a href="../index.html" class="btn">Ma présentation</a>
                    <a href="projects.html" class="btn">Mes projets</a>
                </nav>
            </div>
        </div>
    </body>
</html>
